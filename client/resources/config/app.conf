# Client config (key=value)
output_dir=
gpu_enabled=true
log_level=info

# LLM gguf model path (optional; empty = rule-based highlight only)
llm_model_path=

# Vosk ASR model directory (optional; default models/vosk-model-small-cn-0.22)
vosk_model_dir=

# 网易云热评（借鉴 ObjTube 晴天评论 / Binaryify API 思路）
# 默认直连 music.163.com；可选本地 NeteaseCloudMusicApi，例如 http://127.0.0.1:3000
netease_api_base=
# 可选：自定义爬虫脚本（优先于内置拉取）python script.py <song_id> [limit] → JSON
netease_hot_comments_script=
# 网络失败时是否回退演示数据
netease_hot_comments_demo=true
