# Client config (key=value)
output_dir=
gpu_enabled=true
log_level=info

# LLM gguf model path (optional; empty = rule-based highlight only)
llm_model_path=

# Vosk ASR model directory (optional; default models/vosk-model-small-cn-0.22)
vosk_model_dir=

# OpenCV 帧滤镜（需编译时启用 OpenCV）：clahe | denoise | sharpen | off
opencv_filter=clahe
# 播放中是否应用 OpenCV（硬解时建议 off，暂停/预览仍用 opencv_filter）
opencv_filter_playback=off
